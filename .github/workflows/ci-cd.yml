# =====================================================================
# @domain:    devops
# @concern:   Quad-Core CI/CD Pipeline (JS + Python + Rust WASM)
# @version:   2.0.0
# @security:  Supply Chain (Pinned Actions / SBOM / CVE Scan / OIDC)
# =====================================================================
#
# Pipeline architecture:
#   PHASE 1 — Parallel validation of all 3 ecosystems (Node/Vite, Python/FastAPI, Rust/wasm-pack)
#   PHASE 2 — Security scan & SBOM generation (after all validations pass)
#   PHASE 3 — Build & push container images to GHCR (main pushes only)
#
# Build targets expected in the project Dockerfile:
#   target: production      → Python FastAPI backend image (CPU)
#   target: production-gpu  → Python FastAPI backend image (GPU)
#   target: frontend        → Nginx + static files image
#

name: Quad-Core CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'

jobs:
  # ==========================================
  # PHASE 1: PARALLEL VALIDATION
  # ==========================================

  validate-frontend:
    name: Validate JS Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests (Vitest)
        run: npm test

      - name: Production build (Vite)
        run: npm run build

  validate-backend:
    name: Validate Python Backend
    # python_server/ uses absolute imports starting with `python_server.*`
    # (e.g. `from python_server.services.wireframe_ai import …`), so the
    # repo root must be on sys.path for any pytest invocation to resolve them.
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: python_server/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r python_server/requirements.txt
          pip install ruff pytest pytest-asyncio httpx

      - name: Lint with Ruff
        run: ruff check python_server/ tests/evals/

      # Top-of-funnel smoke test: ensure the `python_server` package surface
      # imports cleanly. A broken package manifest fails here in <1s with a
      # clear message rather than producing a cryptic conftest error mid-pytest.
      - name: Import smoke test
        run: python -c 'import python_server.main'

      - name: Run pytest
        run: |
          # `python_server/tests/` is created on demand; if absent, skip it
          # gracefully so PRs don't fail before any Python tests are scaffolded.
          # --rootdir forces deterministic pytest rootdir selection when both
          # repo-root and python_server/tests/ candidates could win.
          if [ -d python_server/tests ]; then
            pytest python_server/tests/ tests/evals/ \
              --rootdir=${{ github.workspace }} \
              --junitxml=pytest-report.xml --tb=short
          else
            pytest tests/evals/ \
              --rootdir=${{ github.workspace }} \
              --junitxml=pytest-report.xml --tb=short
          fi

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report
          path: pytest-report.xml

  validate-wasm:
    name: Validate Rust WASM Core
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust_core

      # Pre-built wasm-pack binary via OIDC action — avoids 5+ minute
      # `cargo install wasm-pack` cold-compile on every run.
      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          rust_version: stable
          # Pin the toolchain so `wasm-pack --version` is reproducible across runs.
          args: --version 0.13.0

      - name: Build WASM (release)
        run: wasm-pack build rust_core/ --target web --release

      - name: Run native cargo tests
        run: cd rust_core && cargo test --lib

      - name: Verify WASM artifact exists
        run: test -f rust_core/pkg/quad_core_physics_bg.wasm

      - name: Upload WASM package (for staging inspection only —
            prod builds rebuild inside Dockerfile Stage 2)
        uses: actions/upload-artifact@v4
        with:
          name: wasm-pkg
          path: rust_core/pkg/
          if-no-files-found: error

  # ==========================================
  # PHASE 2: SECURITY & SUPPLY CHAIN
  # ==========================================

  security-scan:
    name: Security & SBOM
    needs: [validate-frontend, validate-backend, validate-wasm]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          path: ./
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.cyclonedx.json

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: 'fs'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy'

  # ==========================================
  # PHASE 3: BUILD & DEPLOY (main pushes only)
  # ==========================================

  build-and-deploy:
    name: Build & Deploy
    needs: [security-scan]
    # Gate deploys to main only — PRs run Phase 1+2 to surface regressions
    # without triggering image publish.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
      # OIDC for cloud-provider keyless deploys (EKS/GKE/Cloud Run). Keep
      # even if no cloud secret is wired — costs nothing and unblocks future
      # deployment jobs without re-reviewing RBAC.
      id-token: write
    steps:
      - uses: actions/checkout@v4

      # Buildx MUST be installed before any docker/build-push-action call.
      # Without it, `cache-from: type=gha` / `cache-to: type=gha` silently
      # downgrade to legacy builder with no cache, costing ~10min per build.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Metadata for CPU backend image ──
      - name: Extract Docker metadata (CPU backend)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=cpu,enable=${{ github.ref == 'refs/heads/main' }}

      # ── Metadata for GPU backend image (custom -gpu suffix) ──
      - name: Extract Docker metadata (GPU backend)
        id: meta-gpu
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,suffix=-gpu,format=short
            type=ref,event=branch,suffix=-gpu
            type=semver,pattern={{version}},suffix=-gpu
            type=raw,value=gpu,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest-gpu,enable=${{ github.ref == 'refs/heads/main' }}

      # ── Build & push: CPU backend (python:3.11-slim) ──
      - name: Build and push CPU backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: production
          provenance: true
          sbom: true

      # ── Build & push: GPU backend (nvidia/cuda) ──
      - name: Build and push GPU backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta-gpu.outputs.tags }}
          labels: ${{ steps.meta-gpu.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: production-gpu
          provenance: true
          sbom: true

      # ── Build & push: Frontend (nginx + static files) ──
      - name: Build and push frontend (nginx) image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: frontend
          provenance: true
          sbom: true

      # ── Deploy summary (Kubectl/Helm/Compose commands listed for ops) ──
      - name: Deploy summary
        if: always()
        run: |
          echo "=== Built and pushed ==="
          echo "  Frontend:   ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:${{ github.sha }}"
          echo "  CPU Backend: ${{ steps.meta.outputs.tags }}"
          echo "  GPU Backend: ${{ steps.meta-gpu.outputs.tags }}"
          echo ""
          echo "Example Kubernetes rollouts (uncomment to activate):"
          echo "  kubectl set image deployment/going-balls-frontend \\"
          echo "    frontend=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:${{ github.sha }}"
          echo "  kubectl set image deployment/going-balls-api \\"
          echo "    api=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tags }}"
          echo "  kubectl set image deployment/going-balls-api-gpu \\"
          echo "    api=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta-gpu.outputs.tags }}"
