<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Going Balls — Quad-Core Edition</title>
    <meta name="description" content="Quad-Core multi-language physics platform: JavaScript orchestrator, Rust WASM physics, Python backend, Lua economy.">
    <meta name="theme-color" content="#1a0a2e">
    <meta name="version" content="2.0.0-alpha">
    <link rel="icon" href="assets/image/ball.webp" type="image/webp">
    <link rel="stylesheet" href="styles.css">
    <style>
        @font-face {
            font-family: '5x5dots';
            src: url('assets/font/5x5dots.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 50%, #0a1a2e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            touch-action: none;
            color: #fff;
        }

        /* Quad-Core Status Overlay */
        #core-status {
            position: fixed;
            top: 12px;
            left: 12px;
            z-index: 10000;
            display: flex;
            gap: 6px;
            font-family: '5x5dots', monospace;
            font-size: 9px;
            letter-spacing: 1px;
            pointer-events: none;
        }
        .core-chip {
            padding: 4px 8px;
            border-radius: 4px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.4);
            transition: all 0.3s ease;
        }
        .core-chip.active {
            color: #44ff88;
            border-color: #44ff88;
            background: rgba(68,255,136,0.08);
        }
        .core-chip.warn {
            color: #ffaa44;
            border-color: #ffaa44;
            background: rgba(255,170,68,0.08);
        }

        /* Loading screen */
        #loading-overlay {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, rgba(10,10,26,0.95), rgba(26,10,46,0.9));
            z-index: 99999;
            color: white;
            flex-direction: column;
            gap: 16px;
            pointer-events: auto;
            font-family: '5x5dots', monospace;
        }
        #loading-overlay h1 {
            font-size: 22px;
            letter-spacing: 3px;
            background: linear-gradient(90deg, #44ff88, #8844ff, #44ccff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        #loading-sub {
            font-size: 11px;
            color: rgba(255,255,255,0.4);
            letter-spacing: 2px;
        }
        #loading-bar-container {
            width: 60%;
            max-width: 400px;
            height: 3px;
            background: rgba(255,255,255,0.06);
            border-radius: 2px;
            overflow: hidden;
        }
        #loading-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #44ff88, #8844ff);
            transition: width 0.3s ease;
        }
        #loading-text {
            font-size: 10px;
            color: rgba(255,255,255,0.3);
        }

        /* Core architecture animation dots */
        .core-dots {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }
        .core-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.08);
            transition: all 0.3s ease;
        }
        .core-dot.active {
            background: #44ff88;
            box-shadow: 0 0 8px rgba(68,255,136,0.4);
        }

        /* UI containers */
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Rest of the styles are imported from styles.css */
    </style>
</head>
<body>
    <!-- Loading Overlay -->
    <div id="loading-overlay">
        <h1>⟐ QUAD CORE</h1>
        <div id="loading-sub">INITIALIZING MULTI-LANGUAGE ARCHITECTURE</div>
        <div id="loading-bar-container">
            <div id="loading-bar"></div>
        </div>
        <div id="loading-text">Booting sub-systems...</div>
        <div class="core-dots">
            <div class="core-dot" id="dot-js"></div>
            <div class="core-dot" id="dot-wasm"></div>
            <div class="core-dot" id="dot-py"></div>
            <div class="core-dot" id="dot-lua"></div>
        </div>
    </div>

    <!-- Core Status Chips -->
    <div id="core-status">
        <span class="core-chip" id="chip-js">JS</span>
        <span class="core-chip" id="chip-wasm">WASM</span>
        <span class="core-chip" id="chip-py">PY</span>
        <span class="core-chip" id="chip-lua">LUA</span>
    </div>

    <!-- Game UI -->
    <div id="ui">
        <div id="top-bar" style="display:flex;justify-content:space-between;align-items:center;font-family:'5x5dots',monospace;font-size:12px;letter-spacing:1px;">
            <div id="game-title" style="color:rgba(255,255,255,0.15);">GOING BALLS v2.0</div>
            <div id="frame-info" style="color:rgba(255,255,255,0.15);font-size:9px;"></div>
        </div>
        <div id="bottom-bar" style="display:flex;justify-content:space-between;align-items:flex-end;"></div>
    </div>

    <!-- Top Menu -->
    <div id="top-menu"></div>

    <!-- Overlay for modals -->
    <div id="overlay"></div>

    <!-- Joystick Controls -->
    <div id="joystick-container"></div>
    <div id="jump-btn" role="button" tabindex="0" aria-label="Jump">JUMP</div>

    <!-- Vite dev server handles module resolution for npm packages.
         Import maps are provided as fallback for production builds.
         Packages: three@0.184, cannon-es@0.20, wasmoon@1.16, nipplejs@0.10 -->
    <script type="module" src="/main.js"></script>
</body>
</html>
