# =====================================================================
# @domain:    infrastructure
# @concern:   Production Orchestration — Frontend/Backend/DB/Cache
# @version:   1.0.0
# @security:  GPU Passthrough / Dual Networks (Public + Internal:true)
# =====================================================================
#
# Architecture:
#   frontend  — Nginx reverse proxy on public_net + internal_net
#   backend   — Python FastAPI (GPU-accelerated) on internal_net ONLY
#   db        — PostgreSQL 16 on internal_net ONLY
#   redis     — Redis 7 on internal_net ONLY
#
# Only frontend (Nginx) is exposed to the host. Backend is isolated
# on an internal-only network — no direct external access to the AI layer.
#
# Prerequisites for GPU support:
#   1. Install nvidia-container-toolkit on the host
#   2. Configure Docker with NVIDIA runtime
#   3. See: https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/
#

version: '3.9'

services:
  # ── Thin Client Frontend (Nginx + Static Files) ───────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - public_net
      - internal_net
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

  # ── Thick Backend (Python FastAPI — GPU Accelerated) ──────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production-gpu
    expose:
      - "8000"           # Internal only — NOT mapped to host
    environment:
      - PYTHONUNBUFFERED=1
      - API_SECRET_KEY=${API_SECRET_KEY:?API_SECRET_KEY is required}
      - LEVEL_GEN_FERNET_KEY=${LEVEL_GEN_FERNET_KEY:?LEVEL_GEN_FERNET_KEY is required}
      - DATABASE_URL=postgresql://app_user:${DB_PASSWORD:?DB_PASSWORD is required}@db:5432/going_balls
      - REDIS_URL=redis://redis:6379/0
      - CLIENT_ORIGIN=${CLIENT_ORIGIN:?CLIENT_ORIGIN is required}
      - ENV=production
      # GPU/HAWP config
      - HAWP_WEIGHTS_PATH=/opt/models/hawp_v2.pth
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    volumes:
      - ai_models:/opt/models
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal_net     # Strictly isolated — no public access
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=64M
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '1.0'
          memory: 2G
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # ── Database (PostgreSQL 16) ──────────────────────────────────────
  db:
    image: postgres:16-alpine@sha256:e013e867e712fec275706a6c51c966f0bb0c93cfa8f51000f85a15f9865a28cb
    environment:
      - POSTGRES_USER=app_user
      - POSTGRES_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
      - POSTGRES_DB=going_balls
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d going_balls"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - internal_net
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  # ── Cache & Rate Limiting (Redis 7) ───────────────────────────────
  redis:
    image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 300 10
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks:
      - internal_net
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 384M
        reservations:
          cpus: '0.1'
          memory: 64M

volumes:
  pg_data:
    driver: local
  redis_data:
    driver: local
  ai_models:
    driver: local

networks:
  public_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/24
          gateway: 172.21.0.1

  internal_net:
    driver: bridge
    internal: true           # No external access — AI layer is fully isolated
    ipam:
      config:
        - subnet: 172.20.0.0/24
          gateway: 172.20.0.1
