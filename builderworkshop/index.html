<style>
    :root {
      --glass-bg: rgba(20, 20, 25, 0.6);
      --glass-border: rgba(255, 255, 255, 0.12);
      --accent-blue: #3b82f6;
      --accent-purple: #8b5cf6;
      --text-main: #f3f4f6;
      --text-dim: #9ca3af;
    }

    body {
      margin: 0;
      padding: 0;
      background: #09090b;
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow: hidden;
      height: 100vh;
    }

    #root {
      position: relative;
      width: 100%;
      height: 100%;
    }

    /* Glass Panels */
    .glass-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
      pointer-events: auto;
    }

    /* Shimmer Effect */
    .glass-panel::after {
      content: "";
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(45deg, transparent 45%, rgba(255, 255, 255, 0.03) 50%, transparent 55%);
      animation: shimmer 12s infinite linear;
      pointer-events: none;
    }

    @keyframes shimmer {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Entrance Animations */
    @keyframes entrance {
      from { opacity: 0; transform: translateY(15px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .animate-in {
      opacity: 0;
      animation: entrance 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    /* Button Interactions */
    button, select, input[type="color"] {
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .btn-glow:hover {
      transform: scale(1.02);
      box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
      filter: brightness(1.1);
    }

    .btn-glow:active {
      transform: scale(0.97);
    }

    .field-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--accent-blue);
      letter-spacing: 0.1em;
      margin-bottom: 6px;
      display: block;
    }

    /* Tool UI Layout */
    #ui-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      pointer-events: none;
      padding: 24px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .hidden { display: none !important; }

    /* Custom range styling */
    input[type="range"] {
      -webkit-appearance: none;
      background: rgba(255,255,255,0.1);
      height: 4px;
      border-radius: 2px;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      height: 14px;
      width: 14px;
      border-radius: 50%;
      background: var(--accent-blue);
      cursor: pointer;
      box-shadow: 0 0 8px rgba(59, 130, 246, 0.5);
    }
  </style>
  <!-- Import map: resolves bare specifiers in /builderworkshop/app.js (and any
       module loaded from it) to ESM CDN URLs. Required when serving statically
       (e.g. via `node server.js`) or in production deploys without Vite.
       Kept in sync with /index.html's importmap. -->
  <script type="importmap">
  {
      "imports": {
          "three":          "https://esm.sh/three@0.184.0",

  }
  </script>

<!-- Space Shader Logic -->
<script>
    (function() {
      const canvas = document.getElementById('shader-canvas-ANIMATION_5');
      function syncSize() {
        const w = window.innerWidth;
        const h = window.innerHeight;
        if (canvas.width !== w || canvas.height !== h) {
          canvas.width  = w;
          canvas.height = h;
        }
      }
      window.addEventListener('resize', syncSize);
      syncSize();

      const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
      if (!gl) return;
      const vs = `attribute vec2 a_position;
    varying vec2 v_texCoord;
    void main() {
      v_texCoord = a_position * 0.5 + 0.5;
      gl_Position = vec4(a_position, 0.0, 1.0);
    }`;
      const fs = `precision highp float;
    varying vec2 v_texCoord;
    uniform float u_time;
    uniform vec2 u_resolution;

    void main() {
        vec2 uv = v_texCoord;
        vec3 color1 = vec3(0.02, 0.02, 0.05); 
        vec3 color2 = vec3(0.05, 0.03, 0.08); 
        vec3 finalColor = mix(color1, color2, uv.y + 0.2 * sin(u_time * 0.5 + uv.x * 3.0));
        float glow = 0.05 * sin(u_time * 1.2 + uv.x * 5.0) * cos(u_time * 0.8 + uv.y * 4.0);
        finalColor += vec3(0.05, 0.08, 0.15) * glow;
        vec2 grid = fract(uv * 15.0 - 0.5);
        float line = smoothstep(0.0, 0.015, grid.x) * smoothstep(1.0, 0.985, grid.x) *
                     smoothstep(0.0, 0.015, grid.y) * smoothstep(1.0, 0.985, grid.y);
        finalColor += (1.0 - line) * 0.015;
        gl_FragColor = vec4(finalColor, 1.0);
    }`;
      function cs(type, src) {
        const s = gl.createShader(type);
        gl.shaderSource(s, src);
        gl.compileShader(s);
        return s;
      }
      const prog = gl.createProgram();
      gl.attachShader(prog, cs(gl.VERTEX_SHADER, vs));
      gl.attachShader(prog, cs(gl.FRAGMENT_SHADER, fs));
      gl.linkProgram(prog);
      gl.useProgram(prog);
      const buf = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, buf);
      gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
      const pos = gl.getAttribLocation(prog, 'a_position');
      gl.enableVertexAttribArray(pos);
      gl.vertexAttribPointer(pos, 2, gl.FLOAT, false, 0, 0);
      const uTime = gl.getUniformLocation(prog, 'u_time');
      const uRes = gl.getUniformLocation(prog, 'u_resolution');

      function render(t) {
        gl.viewport(0, 0, canvas.width, canvas.height);
        if (uTime) gl.uniform1f(uTime, t * 0.001);
        if (uRes) gl.uniform2f(uRes, canvas.width, canvas.height);
        gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
        requestAnimationFrame(render);
      }
      render(0);
    })();

      if (e.target.value === 'paint') paintControls.classList.remove('hidden');
      if (e.target.value === 'sculpt' && sculptControls) sculptControls.classList.remove('hidden');
      if (e.target.value === 'shader' && lumenControls) lumenControls.classList.remove('hidden');
