# =====================================================================
# @domain:    infrastructure
# @concern:   Nginx Reverse Proxy — WASM Threading / API Proxy / TLS
# @version:   1.0.0
# @security:  COOP/COEP / HSTS / XSS Protection / TLS 1.3
# =====================================================================
#
# Serves static frontend files and proxies /api/* to the Python backend.
# COOP/COEP headers are REQUIRED for SharedArrayBuffer (WASM threading).
#

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ─────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main buffer=16k;

    # ── Basic Tuning ────────────────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    keepalive_requests  100;
    # 50M ceiling covers community track uploads + wireframe-import payloads
    # larger than the prior 10M cap, while still bounding pathological POST bodies.
    client_max_body_size 50M;

    # ── Gzip Compression ────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/wasm
        image/svg+xml
        image/webp
        font/woff2
        application/octet-stream;

    # ── Rate Limiting Zones ─────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=static:10m rate=100r/s;

    # ── Security Headers Map ────────────────────────────────────────
    map $uri $wasm_content_type {
        ~\.wasm$  application/wasm;
        default   $content_type;
    }

    # ── Upstream: Python FastAPI Backend ────────────────────────────
    upstream backend {
        server backend:8000 max_fails=3 fail_timeout=10s;
        keepalive 32;
    }

    # ── HTTP → HTTPS Redirect (always-on in production) ────────────
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS Server (Production) ───────────────────────────────────
    server {
        listen 443 ssl http2 default_server;
        listen [::]:443 ssl http2 default_server;
        server_name play.goingballs.io;

        # TLS — Update these paths with your certs
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # HSTS
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # ── Root: Serve Static Frontend ─────────────────────────────
        root /usr/share/nginx/html;
        index index.html;

        # WASM threading headers — REQUIRED for SharedArrayBuffer
        add_header Cross-Origin-Opener-Policy  "same-origin"        always;
        add_header Cross-Origin-Embedder-Policy "require-corp"       always;

        # General security headers
        add_header X-Content-Type-Options    "nosniff"              always;
        add_header X-Frame-Options           "DENY"                 always;
        add_header X-XSS-Protection          "1; mode=block"        always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy   "default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'wasm-unsafe-eval'; img-src 'self' data: blob:; connect-src 'self' https:; font-src 'self' data:; worker-src 'self' blob:" always;

        # ── Static Asset Locations ──────────────────────────────────

        location / {
            try_files $uri $uri/ /index.html;
            limit_req zone=static burst=200 nodelay;

            # Ensure WASM files get correct MIME type
            types {
                application/wasm wasm;
            }
        }

        # WASM files with aggressive caching
        location ~* \.wasm$ {
            add_header Cross-Origin-Opener-Policy  "same-origin"  always;
            add_header Cross-Origin-Embedder-Policy "require-corp" always;
            add_header Cache-Control "public, immutable, max-age=31536000";
        }

        # JS/CSS assets with content hashing — immutable cache
        location ~* \.(js|css|mjs)$ {
            add_header Cache-Control "public, immutable, max-age=31536000";
        }

        # Fonts & images
        location ~* \.(woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
            add_header Cache-Control "public, immutable, max-age=31536000";
        }

        # Lua scripts (loaded via wasmoon at runtime, not served directly)
        location ~* \.lua$ {
            deny all;
            return 404;
        }

        # ── API Proxy to Python Backend ─────────────────────────────
        location /api/ {
            limit_req zone=api burst=50 delay=10;

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_send_timeout    30s;
            proxy_read_timeout    60s;

            # Buffering
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 8k;

            # Strip /api prefix when proxying (optional — depends on backend route design)
            # rewrite ^/api/(.*) /$1 break;

            # CORS headers (redundant if set by FastAPI, but belt-and-suspenders)
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
            add_header Access-Control-Allow-Credentials "true" always;

            if ($request_method = OPTIONS) {
                add_header Content-Length 0;
                add_header Content-Type text/plain;
                return 204;
            }
        }

        # ── Deny Access to Sensitive Paths ──────────────────────────
        location ~ /\.(git|env|github) {
            deny all;
            return 404;
        }

        location = /package.json {
            deny all;
            return 404;
        }

        # ── Error Pages ─────────────────────────────────────────────
        error_page 404 /404.html;
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            internal;
        }

        location = /404.html {
            internal;
        }
    }
}
