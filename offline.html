<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Going Balls — Offline</title>
    <meta name="robots" content="noindex">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, #0a0a2e 0%, #1a1a4e 40%, #87ceeb 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            text-align: center;
            padding: 24px;
            overflow: hidden;
        }
        .ball {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #ffe066, #ff9900, #cc5500);
            box-shadow: 0 8px 32px rgba(255, 153, 0, 0.5), inset 0 -4px 12px rgba(0,0,0,0.3);
            margin-bottom: 32px;
            animation: bounce 1.8s ease-in-out infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        h1 {
            font-family: '5x5dots', monospace;
            font-size: 28px;
            margin-bottom: 12px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        p {
            font-size: 16px;
            opacity: 0.85;
            max-width: 360px;
            line-height: 1.5;
            margin-bottom: 28px;
        }
        .wifi-off {
            font-size: 48px;
            margin-bottom: 8px;
            opacity: 0.6;
        }
        button {
            padding: 14px 36px;
            font-size: 16px;
            background: #ffcc00;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            color: #333;
            box-shadow: 0 4px 0 #ccaa00;
            transition: transform 0.1s, box-shadow 0.1s;
            font-family: '5x5dots', monospace;
        }
        button:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #ccaa00;
        }
        .tip {
            position: fixed;
            bottom: 20px;
            font-size: 12px;
            opacity: 0.4;
        }
    </style>
</head>
<body>
    <div class="ball"></div>
    <div class="wifi-off">📡</div>
    <h1>You're Offline</h1>
    <p>It looks like you've lost your internet connection. Check your network and try again.</p>
    <button onclick="window.location.reload()">Retry</button>
    <div class="tip">Going Balls works best with a connection for multiplayer &amp; leaderboards.</div>
</body>
</html>
